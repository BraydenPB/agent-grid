name: Release

# Triggered when a version tag is pushed (e.g. v0.2.0-alpha.1).
# Builds Tauri binaries on Windows, macOS (arm64), and Linux, then attaches
# them to the GitHub Release matching the tag.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for tauri-plugin-updater. Without these, builds succeed
          # but produce no .sig files and the updater will reject the release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'See [CHANGELOG.md](https://github.com/BraydenPB/agent-grid/blob/master/CHANGELOG.md) for details.'
          # Must be a published, non-prerelease release for the /releases/latest/
          # endpoint to resolve: GitHub excludes both drafts and prereleases from
          # /latest/. The alpha/beta suffix in the version string conveys pre-GA
          # status on its own. Flip prerelease back to true once you host
          # latest.json somewhere that doesn't rely on /releases/latest/.
          releaseDraft: false
          prerelease: false
          # NSIS is the modern Windows installer for Tauri v2; prefer it in latest.json
          # over the legacy MSI when both are built.
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
